image: ubuntu:20.04

variables:
  ARCH: arm64
  # 注意：不使用 LLVM=1 / LLVM_IAS=1 - LineageOS 官方构建不用这个
  # 仅设置 CC=clang + LD=ld.lld，其余工具用 GCC 工具链的
  GIT_STRATEGY: clone

stages:
  - build

before_script:
  - apt-get update
  - apt-get install -y
    git curl wget zip unzip python3
    build-essential libssl-dev bc cpio kmod
    device-tree-compiler lz4 zstd flex bison libelf-dev
    gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
    gcc-arm-linux-gnueabi
    lld llvm binutils

build-kernel:
  stage: build
  timeout: 2h
  artifacts:
    name: "kebab-kernel-${CI_COMMIT_SHORT_SHA}"
    paths:
      - kernel/out/arch/arm64/boot/Image.gz
    expire_in: 30 days
  script:
    # 1. 下载 clang r450784d - 尝试多个国内可用源
    - |
      for url in \
        "https://github.com.cnpmjs.org/TheBizarreAbhishek/clang-r450784d.git" \
        "https://ghproxy.com/https://github.com/TheBizarreAbhishek/clang-r450784d.git" \
        "https://gitee.com/weifeng2026/clang-r450784d.git" \
        "https://gitlab.com/SwapnilVicky/clang-r450784d.git"; do
        echo "Trying: $url"
        git clone --depth 1 "$url" /tmp/clang && break
      done
    - /tmp/clang/bin/clang --version

    # 2. 克隆内核源码 - 使用国内镜像
    - git clone --depth 500 --branch lineage-20
      https://github.com.cnpmjs.org/LineageOS/android_kernel_oneplus_sm8250.git kernel
    - cd kernel
    - git checkout 5dea892fe7e4
    - git log --oneline -1

    # 3. 应用补丁
    - patch -p1 --forward --fuzz=3 < ../kernel-patches/fix_strnstr_msm_drv.patch || true
    - echo "=== Patches applied ==="

    # 4. 配置内核 - 与 LineageOS 官方一致：不用 LLVM=1 / LLVM_IAS=1
    - |
      export PATH="/tmp/clang/bin:$PATH"
      make O=out ARCH=arm64 \
        CC=clang LD=/tmp/clang/bin/ld.lld \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        vendor/kona-perf_defconfig
    - cp ../kernel-patches/ksu.config.pure out/.config
    - |
      make O=out ARCH=arm64 \
        CC=clang LD=/tmp/clang/bin/ld.lld \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        olddefconfig
    - echo "=== Config ready ==="

    # 5. 构建内核 - 不使用 LLVM=1 / LLVM_IAS=1
    - |
      export PATH="/tmp/clang/bin:$PATH"
      make -j"$(nproc --all)" O=out ARCH=arm64 \
        CC=clang LD=/tmp/clang/bin/ld.lld \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        2>&1 | tee build.log

    # 8. 验证
    - |
      if [ ! -f out/arch/arm64/boot/Image.gz ] && [ ! -f out/arch/arm64/boot/Image ]; then
        echo "Build failed"
        tail -200 build.log
        exit 1
      fi
      if [ ! -f out/arch/arm64/boot/Image.gz ] && [ -f out/arch/arm64/boot/Image ]; then
        gzip -c out/arch/arm64/boot/Image > out/arch/arm64/boot/Image.gz
      fi
      ls -lh out/arch/arm64/boot/
