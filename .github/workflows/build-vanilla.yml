name: Build Vanilla Kernel for OnePlus 8T (kebab)

on:
  push:
    branches: [ main ]
    paths:
      - 'kernel-patches/ksu.config.pure'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build vanilla kebab kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget zip unzip python3 python3-pip \
            build-essential libssl-dev bc cpio kmod ccache \
            device-tree-compiler lz4 zstd flex bison libelf-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            lld llvm binutils

      - name: Clone Android clang r450784d toolchain
        run: |
          git clone --depth 1 https://github.com/TheBizarreAbhishek/clang-r450784d.git /tmp/clang-r450784d
          ls -lh /tmp/clang-r450784d/bin/clang
          /tmp/clang-r450784d/bin/clang --version

      - name: Clone LineageOS 20 kernel source
        run: |
          git clone --depth 1 --branch lineage-20 \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel

      - name: Configure kernel (PURE ORIGINAL CONFIG - no KSU/SUSFS)
        working-directory: kernel
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_PREBUILT_BIN="/tmp/clang-r450784d/bin"

          make O=out ARCH=arm64 \
            CLANG_PREBUILT_BIN="$CLANG_PREBUILT_BIN" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            vendor/kona-perf_defconfig

          cp ../kernel-patches/ksu.config.pure out/.config

          make O=out ARCH=arm64 \
            CLANG_PREBUILT_BIN="$CLANG_PREBUILT_BIN" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            olddefconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export KCFLAGS="-fno-pic"
          export CLANG_PREBUILT_BIN="/tmp/clang-r450784d/bin"

          make -j"$(nproc --all)" O=out ARCH=arm64 \
            CLANG_PREBUILT_BIN="$CLANG_PREBUILT_BIN" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee build.log

      - name: Verify kernel image
        working-directory: kernel
        run: |
            IMAGE_GZ=out/arch/arm64/boot/Image.gz
            IMAGE=out/arch/arm64/boot/Image
            if [ ! -f "$IMAGE_GZ" ] && [ ! -f "$IMAGE" ]; then
            echo "Build failed — no kernel image produced"
            tail -200 build.log
            exit 1
            fi
            if [ ! -f "$IMAGE_GZ" ] && [ -f "$IMAGE" ]; then
            echo "Image.gz not found, compressing Image..."
            gzip -c "$IMAGE" > "$IMAGE_GZ"
            fi
            ls -lh out/arch/arm64/boot/

      - name: Prepare artifact
        run: |
            mkdir -p artifact
            cp kernel/out/arch/arm64/boot/Image.gz artifact/Image.gz
            cp kernel/out/arch/arm64/boot/dtb.img artifact/dtb.img 2>/dev/null || true
            cp kernel/out/arch/arm64/boot/dtbo.img artifact/dtbo.img 2>/dev/null || true
            cd artifact
            zip -r9 ../kebab-kernelsu-vanilla-a13-4.19.zip .
            cd ..
            ls -lh kebab-kernelsu-vanilla-a13-4.19.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kebab-kernelsu-vanilla-a13-4.19
          path: kebab-kernelsu-vanilla-a13-4.19.zip
          retention-days: 30
