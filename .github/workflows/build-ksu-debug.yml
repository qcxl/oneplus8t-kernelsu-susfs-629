name: Build rsuntk KSU + SUSFS Kernel (debug)

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'build-boot-img.py'
      - 'kernel-patches/**'
      - '.github/workflows/build-ksu-debug.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build kebab KSU+SUSFS with debug
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            git curl wget zip unzip python3 python3-pip \
            build-essential libssl-dev bc cpio kmod ccache \
            device-tree-compiler lz4 zstd flex bison libelf-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            lld llvm binutils
          pip3 install pyelftools

      - name: Clone Android clang r450784d toolchain
        run: |
          git clone --depth 1 https://github.com/TheBizarreAbhishek/clang-r450784d.git /tmp/clang-r450784d
          ls -lh /tmp/clang-r450784d/bin/clang
          /tmp/clang-r450784d/bin/clang --version

      - name: Clone LineageOS 20 kernel source (device exact commit)
        run: |
          git clone --depth 500 --branch lineage-20 \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel
          cd kernel
          git checkout 5dea892fe7e4
          git log --oneline -1

      - name: Apply kernel compatibility patches
        working-directory: kernel
        run: |
          patch -p1 --forward --fuzz=3 < ../kernel-patches/fix_strnstr_msm_drv.patch || echo "WARNING: fix_strnstr_msm_drv.patch failed (may already be applied)"
          patch -p1 --forward --fuzz=3 < ../kernel-patches/fix_dtb_no_qcom.patch || echo "WARNING: fix_dtb_no_qcom.patch failed (may already be applied)"
          echo "=== Patches applied ==="

      - name: Install KSU fd hook in init/main.c
        working-directory: kernel
        run: |
          if grep -q 'ksu_install_fd' init/main.c 2>/dev/null; then
            echo "KSU fd hook already in init/main.c"
          else
            patch -p1 --forward --fuzz=3 < ../kernel-patches/fix_ksu_install_fd.patch || {
              echo "WARNING: patch failed, applying manually..."
              # Add extern declaration before kernel_init_freeable (once, not after every #include)
              sed -i '/^static int __ref kernel_init_freeable/i #ifdef CONFIG_KSU\nextern int ksu_install_fd(void);\n#endif' init/main.c
              # Add fd install call inside kernel_init_freeable
              sed -i '/^static int __ref kernel_init_freeable/a #ifdef CONFIG_KSU\n\tif (ksu_install_fd() < 0)\n\t\tpr_err("KSU: failed to install KSU fd\\n");\n#endif' init/main.c
            }
            grep -n 'ksu_install_fd' init/main.c
          fi

      - name: Integrate KernelSU-Next (legacy branch - non-GKI 4.19)
        working-directory: kernel
        run: |
          # KernelSU-Next legacy: designed for non-GKI, default y if !KPROBES
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/legacy/kernel/setup.sh" \
            | bash -s legacy
          # Force KSU_VERSION to match app requirement (>=33188)
          # The legacy branch has fewer git commits than dev, so auto-detected
          # version (33133) is lower than the app's MINIMAL_SUPPORTED_KERNEL (33188).
          # Must patch both Makefile AND Kbuild (Kbuild takes precedence).
          sed -i 's/ccflags-y += -DKSU_VERSION=.*/ccflags-y += -DKSU_VERSION=33188/' drivers/kernelsu/Kbuild 2>/dev/null || true
          sed -i 's/ccflags-y += -DKSU_VERSION=.*/ccflags-y += -DKSU_VERSION=33188/' drivers/kernelsu/Makefile 2>/dev/null || true
          # Remove legacy +150 compensation (superseded by explicit version above)
          sed -i 's/+150//' drivers/kernelsu/Kbuild 2>/dev/null || true
          sed -i 's/+150//' drivers/kernelsu/Makefile 2>/dev/null || true
          # Verify
          echo "Makefile KSU_VERSION: $(grep 'DKSU_VERSION' drivers/kernelsu/Makefile 2>/dev/null | head -1)"
          echo "Kbuild KSU_VERSION: $(grep 'DKSU_VERSION' drivers/kernelsu/Kbuild 2>/dev/null | head -1)"

      - name: Inject KSU prctl handler (for Manager APK fd)
        working-directory: kernel
        run: |
          echo "=== Injecting ksu_handle_prctl handler ==="
          python3 ../scripts/inject-ksu-prctl.py .
          echo "=== Verification ==="
          grep -c 'ksu_handle_prctl' drivers/kernelsu/supercall/supercall.c 2>/dev/null || echo "0"
          grep -c 'ksu_handle_prctl' drivers/kernelsu/supercall/supercall.h 2>/dev/null || echo "0"

      - name: Fix SELinux domain initialization for builtin mode
        working-directory: kernel
        run: |
          echo "=== Injecting SELinux domain init fix ==="
          python3 ../scripts/inject-selinux-domain-init.py .
          echo "=== Verification ==="
          echo "-- ksud_integration.c exec line:"
          grep -n "post-fs-data" drivers/kernelsu/runtime/ksud_integration.c
          echo "-- boot_event.c apply calls:"
           grep -n "apply_kernelsu_rules\|cache_sid\|setup_ksu_cred" drivers/kernelsu/runtime/boot_event.c || true

      - name: Fix UAPI version mismatch (legacy → v2 compat)
        working-directory: kernel
        run: |
          echo "=== Adding KERNEL_SU_UAPI_VERSION=2 to legacy KSU-Next ==="
          python3 ../scripts/fix-ksu-uapi-v2.py .
          echo "=== Verification ==="
          grep -c 'KERNEL_SU_UAPI_VERSION' drivers/kernelsu/uapi/supercall.h 2>/dev/null || echo "0"
          grep -c 'uapi_version = KERNEL_SU_UAPI_VERSION' drivers/kernelsu/supercall/dispatch.c 2>/dev/null || echo "0"
           grep -c 'GET_INFO_LEGACY' drivers/kernelsu/supercall/dispatch.c 2>/dev/null || echo "0"

      - name: Auto-crown manager by package name (KSU_MANAGER_PACKAGE)
        working-directory: kernel
        run: |
          echo "=== Adding KSU_MANAGER_PACKAGE auto-crown logic ==="
          FILE="drivers/kernelsu/Kbuild"
          # Add default package name BEFORE the existing ifdef block
          # Make evaluates ifdef at parse time (top-to-bottom), so appending
          # at EOF is too late - the earlier ifdef block would skip ccflags.
          if ! grep -q 'KSU_MANAGER_PACKAGE := com.rifsxd.ksunext' "$FILE" 2>/dev/null; then
            sed -i '0,/^ifdef KSU_MANAGER_PACKAGE$/s/^ifdef KSU_MANAGER_PACKAGE$/ifndef KSU_MANAGER_PACKAGE\nKSU_MANAGER_PACKAGE := com.rifsxd.ksunext\nendif\n\nifdef KSU_MANAGER_PACKAGE/' "$FILE"
            echo "  Added KSU_MANAGER_PACKAGE default=com.rifsxd.ksunext before ifdef block"
          else
            echo "  KSU_MANAGER_PACKAGE already in Kbuild, skipping"
          fi

          # Add package-name matching code in throne_tracker.c
          python3 ../scripts/inject-ksu-manager-auto-crown.py .

          # Remove "KernelSU: " prefix from klog.h (try multiple paths)
          for FILE3 in "drivers/kernelsu/include/klog.h" "drivers/kernelsu/../KernelSU-Next/include/klog.h" "KernelSU/kernel/include/klog.h"; do
            if [ -f "$FILE3" ]; then
              sed -i 's/#define pr_fmt(fmt) "KernelSU: " fmt/#define pr_fmt(fmt) fmt/' "$FILE3"
              echo "  Removed KernelSU: prefix from $FILE3"
              break
            fi
          done

          # Remove boot_complete_lock so on_boot_completed can retrigger (try multiple paths)
          for FILE4 in "drivers/kernelsu/supercall/dispatch.c" "drivers/kernelsu/../KernelSU-Next/kernel/supercall/dispatch.c" "KernelSU/kernel/supercall/dispatch.c"; do
            if [ -f "$FILE4" ]; then
              sed -i 's/static bool boot_complete_lock = false;/\/\/ boot_complete_lock removed/' "$FILE4"
              sed -i 's/if (!boot_complete_lock) {/{ \/\/ boot_complete_lock removed/' "$FILE4"
              sed -i 's/boot_complete_lock = true;/\/\/ boot_complete_lock = true; (removed)/' "$FILE4"
              echo "  Removed boot_complete_lock from $FILE4"
              break
            fi
          done
          echo "=== Verification ==="
          grep -c 'KSU_MANAGER_PACKAGE' drivers/kernelsu/Kbuild 2>/dev/null || echo "0"
          grep -c 'Auto-crown manager' drivers/kernelsu/manager/throne_tracker.c 2>/dev/null || echo "0"

      - name: Fix built-in - retry-safe setup_ksu_cred in throne_tracker
        working-directory: kernel
        run: |
          echo "=== Adding retry-safe setup_ksu_cred to do_track_throne_core ==="
          python3 ../scripts/inject-deferred-ksu-cred.py .
          echo "=== Verification ==="
          grep -A10 'setup_ksu_cred_retry' drivers/kernelsu/manager/throne_tracker.c || echo "NOT FOUND"

      - name: Fix throne_tracker control flow (post deferred-cred)
        working-directory: kernel
        run: |
          echo "=== Fixing control flow broken by deferred-cred inject ==="
          python3 ../scripts/inject-fix-throne-control-flow.py .
          echo "=== Verification ==="
          grep -c 'throne_control_flow_fixed' drivers/kernelsu/manager/throne_tracker.c || echo "NOT FOUND"

      - name: Convert pr_info/pr_warn to pr_debug (hide dmesg fingerprints)
        working-directory: kernel
        run: |
          echo "=== Converting pr_info/pr_warn to pr_debug ==="
          find drivers/kernelsu -name "*.c" -exec sed -i 's/pr_info(/pr_debug(/g' {} +
          find drivers/kernelsu -name "*.c" -exec sed -i 's/pr_warn(/pr_debug(/g' {} +
          echo "  Done: all pr_info/pr_warn converted to pr_debug"
          echo "=== Verification (should be 0) ==="
          grep -r 'pr_info(' drivers/kernelsu --include="*.c" | wc -l
          grep -r 'pr_warn(' drivers/kernelsu --include="*.c" | wc -l

      - name: Apply SUSFS v2.2.0 (kernel-4.19 branch, local copy)
        working-directory: kernel
        run: |
          # SUSFS source files are committed in ../kernel-patches/ — no network clone needed
          echo "=== Applying SUSFS 50_add patch ==="
          patch -p1 --forward --fuzz=3 < ../kernel-patches/50_add_susfs_in_kernel-4.19.patch || echo "WARNING: 50_add patch failed (may already be applied)"
          cp ../kernel-patches/fs/susfs.c fs/ 2>/dev/null || true
          cp ../kernel-patches/fs/sus_su.c fs/ 2>/dev/null || true
          cp ../kernel-patches/include/linux/susfs.h include/linux/ 2>/dev/null || true
          cp ../kernel-patches/include/linux/sus_su.h include/linux/ 2>/dev/null || true
          cp ../kernel-patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          # Safety: add stub functions for any SUSFS symbols KSUN might reference
          cp ../kernel-patches/susfs_stubs.c fs/ 2>/dev/null || true
          if ! grep -q "susfs_stubs.o" fs/Makefile 2>/dev/null; then
            echo "obj-y += susfs_stubs.o" >> fs/Makefile
          fi
          if ! grep -q "susfs.o" fs/Makefile; then
            echo '' >> fs/Makefile
            echo '# SUSFS' >> fs/Makefile
            echo 'obj-\$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
            echo 'obj-\$(CONFIG_KSU_SUSFS) += sus_su.o' >> fs/Makefile
          fi
          echo "=== SUSFS v1.5.5 applied ==="
          grep "SUSFS_VERSION" include/linux/susfs.h 2>/dev/null || echo "SUSFS_VERSION not found"
          # Override SUSFS version to reflect the ported version
          sed -i 's/define SUSFS_VERSION.*/define SUSFS_VERSION "v2.2.0"/' include/linux/susfs.h
          grep "SUSFS_VERSION" include/linux/susfs.h
          ls -la fs/susfs.c include/linux/susfs.h 2>/dev/null
          # V2.2.0 CMD constants - only add if not already defined in v1.5.5
          for def in \
            'CMD_SUSFS_ADD_SUS_PATH 0x1005' \
            'CMD_SUSFS_ADD_SUS_MOUNT 0x1006' \
            'CMD_SUSFS_ADD_SUS_KSTAT 0x1010' \
            'CMD_SUSFS_UPDATE_SUS_KSTAT 0x1011' \
            'CMD_SUSFS_SET_UNAME 0x1012' \
            'CMD_SUSFS_ADD_OPEN_REDIRECT 0x1020' \
            'CMD_SUSFS_SET_CMDLINE_OR_BOOTCONFIG 0x1030' \
            'CMD_SUSFS_ENABLE_LOG 0x1040' \
            'CMD_SUSFS_ADD_TRY_UMOUNT 0x1050' \
            'CMD_SUSFS_SHOW_VERSION 0x1060' \
            'CMD_SUSFS_SHOW_VARIANT 0x1061' \
            'CMD_SUSFS_SHOW_ENABLED_FEATURES 0x1062'; do
            name="\${def%% *}"
            grep -q "#define \$name " include/linux/susfs_def.h || \
              printf '#define %s\n' "\$def" >> include/linux/susfs_def.h
          done

      - name: Register SUSFS Kconfig and dispatch for KernelSU-Next legacy
        working-directory: kernel
        run: |
          # SUSFS Kconfig symbols must be registered BEFORE merge_config.sh,
          # otherwise CONFIG_KSU_SUSFS_* are silently ignored.
          echo "=== Adding/Updating SUSFS Kconfig menu ==="
          # KSUN legacy installs at drivers/kernelsu/, not KernelSU/kernel/
          KSU_KCONFIG="drivers/kernelsu/Kconfig"
          # Always regenerate: remove old SUSFS section first, then append fresh
          # (fixes cache issue where new features like SUS_PATH_LOOP never get registered)
          if grep -q "KernelSU - SUSFS" "$KSU_KCONFIG" 2>/dev/null; then
            echo "Removing old SUSFS Kconfig section..."
            sed -i '/menu "KernelSU - SUSFS"/,/^endmenu/d' "$KSU_KCONFIG"
          fi
          # Append SUSFS Kconfig menu (use printf to avoid YAML heredoc issues)
          printf '\nmenu "KernelSU - SUSFS"\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS\n    bool "KernelSU addon - SUSFS"\n    depends on KSU\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_HAS_MAGIC_MOUNT\n    bool "Magic mount support"\n    depends on KSU\n    default n\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_PATH\n    bool "Hide suspicious path"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_MOUNT\n    bool "Hide suspicious mounts"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT\n    bool "Auto-hide KSU default mounts"\n    depends on KSU_SUSFS_SUS_MOUNT\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT\n    bool "Auto-hide bind mounts"\n    depends on KSU_SUSFS_SUS_MOUNT\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_KSTAT\n    bool "Spoof kstat"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_OVERLAYFS\n    bool "Spoof overlayfs kstat"\n    depends on KSU_SUSFS\n    default n\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_TRY_UMOUNT\n    bool "Try umount"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT\n    bool "Auto try-umount bind mounts"\n    depends on KSU_SUSFS_TRY_UMOUNT\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SPOOF_UNAME\n    bool "Spoof uname"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_ENABLE_LOG\n    bool "SUSFS debug log"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS\n    bool "Hide KSU/SUSFS from kallsyms"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG\n    bool "Spoof cmdline/bootconfig"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_OPEN_REDIRECT\n    bool "Open redirect"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_MAP\n    bool "Hide /proc/pid/maps entries"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_ENABLE_AVC_LOG_SPOOFING\n    bool "Spoof AVC log entries"\n    depends on KSU_SUSFS\n    default y\n\n' >> "$KSU_KCONFIG"
          printf 'config KSU_SUSFS_SUS_PATH_LOOP\n    bool "Periodic sus_path loop"\n    depends on KSU_SUSFS_SUS_PATH\n    default y\n\n' >> "$KSU_KCONFIG"
          echo "endmenu" >> "$KSU_KCONFIG"
          echo "KSU_SUSFS lines: $(grep -c 'config KSU_SUSFS' "$KSU_KCONFIG")"

          echo "=== Injecting SUSFS dispatch glue ==="
          python3 ../scripts/inject-susfs-dispatch.py .
          echo "=== Post-inject verification ==="
          echo "init.c susfs_init call:"
          grep -c 'susfs_init' drivers/kernelsu/core/init.c 2>/dev/null || echo "0"
          echo "init.c extern susfs_init:"
          grep -c 'extern void susfs_init' drivers/kernelsu/core/init.c 2>/dev/null || echo "0"
          echo "dispatch.c KSU_IOCTL_SUSFS:"
          grep -c 'KSU_IOCTL_SUSFS' drivers/kernelsu/supercall/dispatch.c 2>/dev/null || echo "0"
          echo "supercall.c SUSFS reboot handler:"
          grep -c 'FAFAFAFA' drivers/kernelsu/supercall/supercall.c 2>/dev/null || echo "0"
          # Fallback: ensure extern declaration is present
          if ! grep -q 'extern void susfs_init' drivers/kernelsu/core/init.c 2>/dev/null; then
            echo "WARNING: inject script did not add extern, adding via sed"
            sed -i '/^extern void __init ksu_lsm_hook_init/a extern void susfs_init(void);' drivers/kernelsu/core/init.c
          fi

      - name: Inject SUSFS sus_map feature (Phase 1b)
        working-directory: kernel
        run: |
          echo "=== Injecting sus_map feature ==="
          python3 ../scripts/inject-susfs-sus-map.py .
          echo "=== Verification ==="
          echo "susfs_def.h SUS_MAP:"
          grep -c 'SUS_MAP' include/linux/susfs_def.h 2>/dev/null || echo "0"
          echo "susfs.h SUS_MAP:"
          grep -c 'SUS_MAP' include/linux/susfs.h 2>/dev/null || echo "0"
          echo "susfs.c susfs_add_sus_map:"
          grep -c 'susfs_add_sus_map' fs/susfs.c 2>/dev/null || echo "0"
          echo "task_mmu.c SUS_MAP:"
          grep -c 'SUS_MAP' fs/proc/task_mmu.c 2>/dev/null || echo "0"
          echo "supercall.c FAFAFAFA:"
          grep -c 'FAFAFAFA' drivers/kernelsu/supercall/supercall.c 2>/dev/null || echo "0"

      - name: Inject Batch 1 v2.2.0 features (avc_log + enable_log)
        working-directory: kernel
        run: |
          echo "=== Injecting Batch 1 v2.2.0 features ==="
          python3 ../scripts/inject-v2-features-batch1.py .
          echo "=== Verification ==="
          echo "susfs_def.h AVC_LOG:"
          grep -c 'AVC_LOG_SPOOFING' include/linux/susfs_def.h 2>/dev/null || echo "0"
          echo "susfs.c susfs_set_avc_log_spoofing:"
          grep -c 'susfs_set_avc_log_spoofing' fs/susfs.c 2>/dev/null || echo "0"
          echo "susfs.c susfs_enable_log:"
          grep -c 'susfs_enable_log' fs/susfs.c 2>/dev/null || echo "0"

      - name: Inject Batch 2 v2.2.0 features (hide_mnts + fillattr + map_vma + path_loop)
        working-directory: kernel
        run: |
          echo "=== Injecting Batch 2 v2.2.0 features ==="
          python3 ../scripts/inject-v2-features-batch2.py .
          echo "=== Verification ==="
          echo "susfs_def.h SUS_PATH_LOOP:"
          grep -c 'SUS_PATH_LOOP' include/linux/susfs_def.h 2>/dev/null || echo "0"
          echo "susfs.c hide_sus_mnts:"
          grep -c 'hide_sus_mnts_for_non_su_procs' fs/susfs.c 2>/dev/null || echo "0"
          echo "susfs.c fillattr_spoofer:"
          grep -c 'susfs_generic_fillattr_spoofer' fs/susfs.c 2>/dev/null || echo "0"
          echo "susfs.c path_loop:"
          grep -c 'susfs_add_sus_path_loop' fs/susfs.c 2>/dev/null || echo "0"
          echo "stat.c extern updated:"
          grep -c 'susfs_generic_fillattr_spoofer' fs/stat.c 2>/dev/null || echo "0"
          echo "task_mmu.c extern updated:"
          grep -c 'susfs_show_map_vma_spoofer' fs/proc/task_mmu.c 2>/dev/null || echo "0"

      - name: Inject open_redirect enhanced (v2.2.0 spoof_do_sys_openat/readlink/statfs)
        working-directory: kernel
        run: |
          echo "=== Injecting open_redirect enhanced (v2.2.0) ==="
          python3 ../scripts/inject-open-redirect-enhanced.py .
          echo "=== Verification ==="
          echo "susfs_def.h UID_SCHEME:"
          grep -c 'UID_NON_APP_PROC' include/linux/susfs_def.h 2>/dev/null || echo "0"
          echo "susfs.h uid_scheme field:"
          grep -c 'uid_scheme' include/linux/susfs.h 2>/dev/null || echo "0"
          echo "susfs.c spoof_do_sys_openat:"
          grep -c 'spoof_do_sys_openat' fs/susfs.c 2>/dev/null || echo "0"
          echo "susfs.c spoof_vfs_readlink:"
          grep -c 'spoof_vfs_readlink' fs/susfs.c 2>/dev/null || echo "0"
          echo "susfs.c spoof_vfs_statfs:"
          grep -c 'spoof_vfs_statfs' fs/susfs.c 2>/dev/null || echo "0"
          echo "fs/open.c (4.19 do_sys_open) hook:"
          grep -c 'spoof_do_sys_openat' fs/open.c 2>/dev/null || echo "0"
          echo "fs/namei.c hook:"
          grep -c 'spoof_vfs_readlink' fs/namei.c 2>/dev/null || echo "0"
          echo "fs/proc/base.c hook:"
          grep -c 'spoof_do_proc_readlink' fs/proc/base.c 2>/dev/null || echo "0"
          echo "fs/statfs.c hook:"
          grep -c 'spoof_vfs_statfs' fs/statfs.c 2>/dev/null || echo "0"

      - name: Inject sdcard monitor (v2.2.0 fsnotify, 4.19 adapted)
        working-directory: kernel
        run: |
          echo "=== Injecting sdcard monitor ==="
          python3 ../scripts/inject-susfs-sdcard-monitor.py .
          echo "=== Verification ==="
          ls -la fs/susfs_sdcard_monitor.c 2>/dev/null && echo "  susfs_sdcard_monitor.c OK" || echo "  susfs_sdcard_monitor.c MISSING"
          grep -c 'susfs_sdcard_monitor.o' fs/Makefile 2>/dev/null || echo "0"

      - name: Apply manual hook source patches
        working-directory: kernel
        run: |
          python3 ../scripts/apply-ksu-hooks.py .
          echo "=== Verification ==="
          grep -rn "ksu_handle_faccessat\|ksu_handle_execveat\|ksu_handle_vfs_read\|ksu_handle_sys_reboot" fs/ kernel/ 2>/dev/null


      - name: Apply 4.19 compatibility fixes
        working-directory: kernel
        run: |
          # linux/pgtable.h not in 4.19
          for f in drivers/kernelsu/feature/sucompat.c drivers/kernelsu/core/main.c; do
            if [ -f "$f" ]; then
              sed -i 's|#include <linux/pgtable.h>|/* #include <linux/pgtable.h> - 4.19 compat */|g' "$f" 2>/dev/null || true
              sed -i 's|#include <linux/safe_mode.h>|/* #include <linux/safe_mode.h> - 4.19 compat */|g' "$f" 2>/dev/null || true
            fi
          done
          # strncpy_from_user_nofault not in 4.19
          if [ -f "drivers/kernelsu/sulog/event.c" ]; then
            sed -i 's|strncpy_from_user_nofault(|strncpy_from_user(|g' drivers/kernelsu/sulog/event.c
            sed -i 's|ksu_strncpy_from_user(|strncpy_from_user(|g' drivers/kernelsu/sulog/event.c
          fi
          if [ -f "drivers/kernelsu/runtime/ksud_integration.c" ]; then
            sed -i 's|strncpy_from_user_nofault(|strncpy_from_user(|g' drivers/kernelsu/runtime/ksud_integration.c
          fi
          # copy_to_kernel_nofault not in 4.19
          if [ -f "drivers/kernelsu/hook/arm64/patch_memory.c" ]; then
            sed -i 's|copy_to_kernel_nofault(|memcpy(|g' drivers/kernelsu/hook/arm64/patch_memory.c
            # Ensure patch_memory.o is in Kbuild (legacy branch doesn't include it)
            if ! grep -q "hook/arm64/patch_memory\.o" drivers/kernelsu/Kbuild 2>/dev/null; then
              sed -i '/^kernelsu-objs += hook\/lsm_hooks\.o$/a kernelsu-objs += hook/arm64/patch_memory.o' drivers/kernelsu/Kbuild
              echo "Added hook/arm64/patch_memory.o to Kbuild"
            fi
          fi
          # MODULE_IMPORT_NS not in 4.19
          if [ -f "drivers/kernelsu/core/init.c" ]; then
            sed -i 's/^MODULE_IMPORT_NS.*$/\/\/ MODULE_IMPORT_NS not supported in kernel 4.19/' drivers/kernelsu/core/init.c
          fi

          # safe_mode is not available in 4.19
          if [ -f "drivers/kernelsu/core/main.c" ]; then
            sed -i 's|#include <linux/safe_mode.h>|/* #include <linux/safe_mode.h> - 4.19 compat */|g' drivers/kernelsu/core/main.c 2>/dev/null || true
          fi

          # Ensure ksu_file_wrapper_init doesn't have __init (signature mismatch)
          if [ -f "drivers/kernelsu/infra/file_wrapper.c" ]; then
            sed -i 's/int __init ksu_file_wrapper_init/int ksu_file_wrapper_init/g' drivers/kernelsu/infra/file_wrapper.c
            sed -i 's/void __exit ksu_file_wrapper_exit/void ksu_file_wrapper_exit/g' drivers/kernelsu/infra/file_wrapper.c 2>/dev/null || true
          fi

          # MODULE_LICENSE mismatch fix
          if [ -f "drivers/kernelsu/core/init.c" ]; then
            sed -i 's/MODULE_LICENSE("GPL")/MODULE_LICENSE("GPL v2")/g' drivers/kernelsu/core/init.c 2>/dev/null || true
          fi

          # __NR_execveat: init uses execveat() for second_stage on Android 13+,
          # but KSUN only hooks __NR_execve. Register the same handler for both
          # so the init second_stage hook in ksud_integration.c actually fires.
          if [ -f "drivers/kernelsu/hook/syscall_hook_manager.c" ]; then
            if ! grep -q '__NR_execveat' drivers/kernelsu/hook/syscall_hook_manager.c 2>/dev/null; then
              sed -i '/ksu_register_syscall_hook(__NR_execve, ksu_hook_execve);/a ksu_register_syscall_hook(__NR_execveat, ksu_hook_execve);' drivers/kernelsu/hook/syscall_hook_manager.c
              sed -i '/ksu_unregister_syscall_hook(__NR_execve);/a ksu_unregister_syscall_hook(__NR_execveat);' drivers/kernelsu/hook/syscall_hook_manager.c
              echo "  __NR_execveat hook registered (same handler as __NR_execve)"
            else
              echo "  __NR_execveat hook already present, skipping"
            fi
          else
            echo "  WARNING: syscall_hook_manager.c not found"
          fi

          # TWA_RESUME is not defined in kernel 4.19 (added in 5.9)
          if grep -q 'TWA_RESUME' drivers/kernelsu/supercall/supercall.c 2>/dev/null; then
            sed -i 's/TWA_RESUME/0/g' drivers/kernelsu/supercall/supercall.c
            echo "  TWA_RESUME → 0 (kernel 4.19 compat)"
          else
            echo "  TWA_RESUME already fixed in supercall.c"
          fi

          # KSUD_PATH stays at /data/adb/ksud (ramdisk disabled for now)
          echo "  KSUD_PATH: /data/adb/ksud (ramdisk disabled)"

          echo "=== Compatibility fixes applied ==="

      - name: Inject KSU dev-infra stubs (symbol_resolver for 4.19)
        working-directory: kernel
        run: |
          echo "=== Injecting symbol_resolver stub ==="
          mkdir -p drivers/kernelsu/infra
          cp ../kernel-patches/symbol_resolver_stub.h drivers/kernelsu/infra/symbol_resolver.h
          cp ../kernel-patches/symbol_resolver_stub.c drivers/kernelsu/infra/symbol_resolver.c
          if ! grep -q "symbol_resolver\.o" drivers/kernelsu/Kbuild 2>/dev/null; then
            sed -i '/^kernelsu-objs += infra\/su_mount_ns\.o$/a kernelsu-objs += infra/symbol_resolver.o' drivers/kernelsu/Kbuild
            echo "Added symbol_resolver.o to Kbuild"
          else
            echo "symbol_resolver.o already in Kbuild"
          fi
          echo "=== Verification ==="
          ls -la drivers/kernelsu/infra/symbol_resolver.* 2>/dev/null
          grep -c "symbol_resolver" drivers/kernelsu/Kbuild 2>/dev/null || echo "0"

      - name: Fix seccomp_cache.c struct mismatch for < 6.1 kernels
        working-directory: kernel
        run: |
          echo "=== Fixing seccomp_cache.c for pre-6.1 kernel safety ==="
          python3 ../scripts/fix-seccomp-cache.py .
          echo "=== Verification ==="
          grep -c "LINUX_VERSION_CODE >= KERNEL_VERSION(6, 1, 0)" drivers/kernelsu/infra/seccomp_cache.c 2>/dev/null || echo "0"

      - name: Apply unified selinux_hide.c (filter mode + manager exemption)
        working-directory: kernel
        run: |
          echo "=== Applying unified selinux_hide.c ==="
          cp ../kernel-patches/unified-selinux_hide.c drivers/kernelsu/feature/selinux_hide.c
          # fix header declaration to match int __init ksu_selinux_hide_init(void)
          sed -i 's/void ksu_selinux_hide_init();/int __init ksu_selinux_hide_init(void);/' drivers/kernelsu/feature/selinux_hide.h 2>/dev/null || true
          sed -i 's/void ksu_selinux_hide_exit();/void __exit ksu_selinux_hide_exit(void);/' drivers/kernelsu/feature/selinux_hide.h 2>/dev/null || true
          # also fix hook_manager.h (included by init.c, has separate declaration)
          sed -i 's/void ksu_selinux_hide_init(void);/int __init ksu_selinux_hide_init(void);/' drivers/kernelsu/hook/hook_manager.h 2>/dev/null || true
          sed -i 's/void ksu_selinux_hide_exit(void);/void __exit ksu_selinux_hide_exit(void);/' drivers/kernelsu/hook/hook_manager.h 2>/dev/null || true
          echo "  Copied unified selinux_hide.c"
          echo "=== Verification ==="
          ls -la drivers/kernelsu/feature/selinux_hide.c
          grep -c 'my_write_context' drivers/kernelsu/feature/selinux_hide.c
          grep -c 'buf_mentions_ksu' drivers/kernelsu/feature/selinux_hide.c
          echo "  selinux_hide: filter mode + manager exemption + set_memory_rw/ro + WRITE_ONCE"

      - name: Inject init.rc module RC support (from dev d3e454f)
        working-directory: kernel
        run: |
          echo "=== Injecting init.rc module RC support ==="
          python3 ../scripts/inject-initrc.py .
          echo "=== Verification ==="
          echo "module_rc_buf: $(grep -c 'module_rc_buf' drivers/kernelsu/runtime/ksud_integration.c 2>/dev/null || echo '0')"
          echo "load_module_rc_once: $(grep -c 'load_module_rc_once' drivers/kernelsu/runtime/ksud_integration.c 2>/dev/null || echo '0')"
          echo "append_module_rc in read_proxy: $(grep -c 'append_module_rc' drivers/kernelsu/runtime/ksud_integration.c 2>/dev/null || echo '0')"
          echo "ksu_no_custom_rc: $(grep -c 'ksu_no_custom_rc' drivers/kernelsu/core/init.c 2>/dev/null || echo '0')"

      - name: Inject allow_shell module param
        working-directory: kernel
        run: |
          echo "=== Injecting allow_shell module param ==="
          python3 ../scripts/inject-allow-shell.py .
          echo "=== Verification ==="
          grep -c 'allow_shell' drivers/kernelsu/core/init.c 2>/dev/null || echo "0"

      - name: Inject sulog subsystem (event_queue + sulog from dev)
        working-directory: kernel
        run: |
          echo "=== Injecting sulog subsystem (event_queue + sulog) ==="
          python3 ../scripts/inject-sulog-subsystem.py .
          echo "=== Verification ==="
          for f in infra/event_queue.c sulog/event.c sulog/fd.c feature/sulog.c; do
            if [ -f "drivers/kernelsu/$f" ]; then echo "  ✅ $f"; else echo "  ❌ $f MISSING"; fi
          done
          grep -c 'event_queue.o' drivers/kernelsu/Kbuild 2>/dev/null || echo "0"
          grep -c 'KSU_FEATURE_SULOG' drivers/kernelsu/include/uapi/feature.h 2>/dev/null || echo "0"

      - name: Inject adb_root (from dev)
        working-directory: kernel
        run: |
          echo "=== Injecting adb_root ==="
          python3 ../scripts/inject-adb-root.py .
          echo "=== Verification ==="
          for f in feature/adb_root.c feature/adb_root.h; do
            if [ -f "drivers/kernelsu/$f" ]; then echo "  ✅ $f"; else echo "  ❌ $f MISSING"; fi
          done
          grep -c 'escape_to_root_for_adb_root' drivers/kernelsu/selinux/selinux.c 2>/dev/null || echo "0"
          grep -c 'adb_root' drivers/kernelsu/Kbuild 2>/dev/null || echo "0"

      - name: Inject remove_avtab_node (redundant avtab cleanup)
        working-directory: kernel
        run: |
          echo "=== Injecting remove_avtab_node ==="
          python3 ../scripts/inject-remove-avtab.py .
          echo "=== Verification ==="
          grep -c 'KSU_REMOVE_AVTAB_INJECTED' drivers/kernelsu/selinux/sepolicy.c 2>/dev/null || echo "0"

      - name: Inject setuid_hook simplification (spin_lock protection)
        working-directory: kernel
        run: |
          echo "=== Injecting setuid_hook simplification ==="
          python3 ../scripts/inject-setuid-hook.py .
          echo "=== Verification ==="
          grep -c 'KSU_SETUID_HOOK_SIMPLIFIED' drivers/kernelsu/hook/setuid_hook.c 2>/dev/null || echo "0"

      - name: Configure kernel (device config + KSU + debug)
        working-directory: kernel
        run: |
          export PATH="/tmp/clang-r450784d/bin:/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          CFG="CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-"

          # 1. Base defconfig
          make O=out ARCH=arm64 $CFG vendor/kona-perf_defconfig

          # 2. Apply device config (from running device /proc/config.gz)
          cp ../kernel-patches/ksu.config.pure out/.config

          # 3. Merge KSU+SUSFS options
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config ../kernel-patches/ksu.config

          # 4. Merge debug config (ramoops + verbose logging)
          if [ -f ../kernel-patches/debug.config ]; then
            ./scripts/kconfig/merge_config.sh -m -O out \
              out/.config ../kernel-patches/debug.config
          fi

          # 5. Resolve all config dependencies
          make O=out ARCH=arm64 $CFG olddefconfig

          echo "=== Config ready ==="
          grep -E "CONFIG_KSU=|CONFIG_KSU_SUSFS=|CONFIG_RAMOOPS=|CONFIG_PSTORE_RAM=|CONFIG_KPM=" out/.config
          echo "SUSFS options:"
          grep "CONFIG_KSU_SUSFS_" out/.config | sort

      - name: Save .config for debug
        working-directory: kernel
        run: cp out/.config /tmp/kernel-config.txt

      - name: Build kernel
        shell: bash -e -o pipefail {0}
        working-directory: kernel
        run: |
          export PATH="/tmp/clang-r450784d/bin:/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export KCFLAGS="-fno-pic"
          # Cache buster: change this env var to force ccache miss on any workflow/config change
          export CCACHE_EXTRAFILES="../../.github/workflows/build-ksu-debug.yml:../../kernel-patches/ksu.config:../../kernel-patches/debug.config:../../kernel-patches/unified-selinux_hide.c:../../scripts/inject-susfs-dispatch.py:../../scripts/inject-susfs-sus-map.py:../../scripts/inject-v2-features-batch1.py:../../scripts/inject-v2-features-batch2.py:../../scripts/inject-initrc.py:../../scripts/inject-allow-shell.py:../../scripts/inject-susfs-sdcard-monitor.py:../../build-boot-img.py"
          # ^ ccache includes these file hashes in its key, so any change to workflow/config/inject
          #   automatically invalidates the compilation cache.

          # ld.lld wrapper: allow multiple definitions (DRM + techpack tracepoint collisions)
          mkdir -p /tmp/ksu-build/bin
          printf '#!/bin/bash\nexec /tmp/clang-r450784d/bin/ld.lld --allow-multiple-definition "$@"\n' > /tmp/ksu-build/bin/ld.lld
          chmod +x /tmp/ksu-build/bin/ld.lld
          export PATH="/tmp/ksu-build/bin:$PATH"

          make -j"$(nproc --all)" O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            2>&1 | tee build.log

      - name: Dump build log on failure
        if: failure()
        working-directory: kernel
        run: |
            echo "=== BUILD FAILED ==="
            tail -200 build.log 2>/dev/null || echo "(build.log not found)"

      - name: Verify kernel image
        working-directory: kernel
        run: |
            IMAGE_GZ=out/arch/arm64/boot/Image.gz
            IMAGE=out/arch/arm64/boot/Image
            if [ ! -f "$IMAGE_GZ" ] && [ ! -f "$IMAGE" ]; then
            echo "Build failed — no kernel image produced"
            tail -200 build.log
            exit 1
            fi
            if [ ! -f "$IMAGE_GZ" ] && [ -f "$IMAGE" ]; then
            gzip -c "$IMAGE" > "$IMAGE_GZ"
            fi
            ls -lh out/arch/arm64/boot/
            # Verify KSU + SUSFS symbols in vmlinux
            if [ -f out/vmlinux ]; then
              nm out/vmlinux | grep -c "ksu_handle" > /dev/null && echo "KSU symbols: $(nm out/vmlinux | grep -c "ksu_handle") found" || echo "WARNING: no ksu_handle symbols"
              nm out/vmlinux | grep -c "susfs_init" > /dev/null && echo "SUSFS: susfs_init found" || echo "ERROR: susfs_init NOT in vmlinux!"
            fi

      - name: Inject ksud into ramdisk
        run: |
            KSUD_BIN="prebuilt/ksud"
            if [ ! -f "$KSUD_BIN" ]; then
                echo "ERROR: prebuilt/ksud not found (checked $KSUD_BIN)"
                echo "SKIP_RAMDISK=1" >> $GITHUB_ENV
                exit 0
            fi
            cp "$KSUD_BIN" /tmp/ksud-ramdisk
            chmod 755 /tmp/ksud-ramdisk
            echo "ksud binary: $(stat -c%s /tmp/ksud-ramdisk) bytes"

            echo "=== Downloading stock boot.img ==="
            curl -fSL -o /tmp/stock-boot-ramdisk.img \
              "https://github.com/qcxl/oneplus8t-kernelsu-susfs-629/releases/download/v1-original-boot/boot.img"

            echo "=== Extracting and modifying ramdisk ==="
            python3 scripts/inject-ksud-ramdisk.py /tmp/ksud-ramdisk /tmp/stock-boot-ramdisk.img /tmp/ramdisk-new.lz4
            echo "Ramdisk injection complete, saved to /tmp/ramdisk-new.lz4"

            echo "=== Verifying ksud in ramdisk ==="
            # Decompress and check /ksud exists with correct size
            lz4 -d /tmp/ramdisk-new.lz4 /tmp/ramdisk-verify.raw 2>/dev/null
            KSIZE=$(cpio -it -F /tmp/ramdisk-verify.raw 2>/dev/null | grep -E '^ksud$')
            if [ -n "$KSIZE" ]; then
                echo "  ✅ /ksud found in ramdisk"
            else
                echo "  ❌ /ksud NOT in ramdisk — build will fail!"
                exit 1
            fi
            echo "SKIP_RAMDISK=0" >> $GITHUB_ENV

      - name: Prepare artifact
        run: |
            mkdir -p artifact

            # Kernel images
            cp kernel/out/arch/arm64/boot/Image.gz artifact/Image.gz
            cp kernel/out/arch/arm64/boot/Image artifact/Image 2>/dev/null || true
            cp kernel/out/arch/arm64/boot/dtb.img artifact/dtb.img 2>/dev/null || true
            cp kernel/out/arch/arm64/boot/dtbo.img artifact/dtbo.img 2>/dev/null || true
            cp /tmp/kernel-config.txt artifact/config.txt 2>/dev/null || true
            cp build-boot-img.py artifact/

            # Download original boot.img and create KSU debug boot.img
            echo "Downloading original boot.img from release..."
            curl -fSL -o /tmp/stock-boot.img \
              "https://github.com/qcxl/oneplus8t-kernelsu-susfs-629/releases/download/v1-original-boot/boot.img"

            # Build boot.img (ramdisk injection disabled — repack unstable)
            # RAMDISK_OPT=""
            # if [ "$SKIP_RAMDISK" != "1" ] && [ -f "/tmp/ramdisk-new.lz4" ]; then
            #     RAMDISK_OPT="--ramdisk-file /tmp/ramdisk-new.lz4"
            # fi

            python3 build-boot-img.py /tmp/stock-boot.img \
              kernel/out/arch/arm64/boot/Image \
              artifact/debug-boot.img \
              --append-cmdline "initcall_debug log_buf_len=16M keep_bootcon ignore_loglevel no_console_suspend"

            # KSU boot.img (with KSU+SUSFS)
            cp artifact/debug-boot.img artifact/ksu-debug-boot.img

            # KSU kernel modules (for loading as modules)
            mkdir -p artifact/modules
            find kernel/out -name "*.ko" -exec cp {} artifact/modules/ \; 2>/dev/null || true
            ls -lh artifact/modules/ 2>/dev/null

            cd artifact
            zip -r9 ../kebab-kernel-ksu-debug.zip .
            cd ..
            ls -lh kebab-kernel-ksu-debug.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kebab-kernel-ksu-debug
          path: kebab-kernel-ksu-debug.zip
          retention-days: 30

