name: Build ksud (SUSFS ioctl)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-ksud.yml'

jobs:
  build-ksud:
    name: Build ksud for aarch64-linux-android
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Checkout KernelSU-Next source
        uses: actions/checkout@v4
        with:
          repository: qcxl/KernelSU-Next
          ref: dev
          path: ksu-src

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Build ksud
        working-directory: ksu-src/userspace/ksud
        run: |
          export ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-$PWD/../../android-ndk-r25c}
          export CC_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"
          export AR_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC_aarch64_linux_android"
          cargo build --target aarch64-linux-android --release

      - name: Upload ksud artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksud
          path: ksu-src/userspace/ksud/target/aarch64-linux-android/release/ksud
          retention-days: 7
