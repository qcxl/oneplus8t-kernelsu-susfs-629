name: Build ksud (SUSFS ioctl)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-ksud.yml'

jobs:
  build-ksud:
    name: Build ksud for aarch64-linux-android
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Checkout KernelSU-Next source
        uses: actions/checkout@v4
        with:
          repository: qcxl/KernelSU-Next
          ref: dev

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          echo "ANDROID_NDK_HOME=/tmp/android-ndk-r25c" >> "$GITHUB_ENV"

      - name: Build ksud
        run: |
          set -e
          NDKBIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$NDKBIN/aarch64-linux-android31-clang"
          export AR_aarch64_linux_android="$NDKBIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC_aarch64_linux_android"
          echo "NDK: $ANDROID_NDK_HOME"
          ls -la "$CC_aarch64_linux_android" 2>/dev/null || echo "ERROR: NDK clang not found"
          cd userspace/ksud
          echo "Build dir: $(pwd)"
          ls src/susfsd.rs src/bindings_prebuilt.rs 2>/dev/null || echo "WARN: missing source files"
          cargo build --target aarch64-linux-android --release

      - name: Upload ksud artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ksud
          path: userspace/ksud/target/aarch64-linux-android/release/ksud
          retention-days: 7
