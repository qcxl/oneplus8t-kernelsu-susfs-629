name: Build ksud (debug host)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-ksud.yml'

jobs:
  build-ksud-host:
    name: Build ksud for host (debug)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout KernelSU-Next source
        uses: actions/checkout@v4
        with:
          repository: qcxl/KernelSU-Next
          ref: dev

      - name: Verify source
        run: |
          echo "=== pwd ===" && pwd
          echo "=== files ===" && ls userspace/ksud/src/susfsd.rs userspace/ksud/src/ksucalls.rs 2>/dev/null || echo "FILES NOT FOUND"
          echo "=== susfsd imports ===" && head -5 userspace/ksud/src/susfsd.rs 2>/dev/null || true
          echo "=== ksucalls susfs_ioctl ===" && grep -A5 "susfs_ioctl" userspace/ksud/src/ksucalls.rs 2>/dev/null || true

      - name: Build ksud (host, no bindgen)
        run: |
          cd userspace/ksud
          cargo check 2>&1
