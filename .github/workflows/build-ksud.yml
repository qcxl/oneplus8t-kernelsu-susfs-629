name: Build ksud (SUSFS ioctl)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-ksud.yml'

jobs:
  build-ksud:
    name: Build ksud for aarch64-linux-android
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm llvm-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Checkout KernelSU-Next source
        uses: actions/checkout@v4
        with:
          repository: qcxl/KernelSU-Next
          ref: dev
          path: ksu-src

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r25c" >> "$GITHUB_ENV"
          echo "NDK_TOOLCHAIN=$GITHUB_WORKSPACE/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64" >> "$GITHUB_ENV"

      - name: Build ksud
        run: |
          set -e
          export CC="$NDK_TOOLCHAIN/bin/aarch64-linux-android31-clang"
          export AR="$NDK_TOOLCHAIN/bin/llvm-ar"
          export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$NDK_TOOLCHAIN/sysroot -I/usr/include"
          cd "$GITHUB_WORKSPACE/ksu-src/userspace/ksud"
          echo "Building in $(pwd)"
          ls -la src/susfsd.rs src/ksucalls.rs 2>/dev/null || echo "WARNING: source files not found"
          cargo build --target aarch64-linux-android --release

      - name: Upload ksud artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ksud
          path: ksu-src/userspace/ksud/target/aarch64-linux-android/release/ksud
          retention-days: 7
