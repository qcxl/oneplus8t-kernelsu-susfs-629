name: Build Vanilla Kernel (GCC, device commit)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build vanilla kebab kernel (GCC)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget zip unzip python3 python3-pip \
            build-essential libssl-dev bc cpio kmod ccache \
            device-tree-compiler lz4 zstd flex bison libelf-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Clone LineageOS 20 kernel source (device exact commit)
        run: |
          git clone --depth 500 --branch lineage-20 \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel
          cd kernel
          git checkout 5dea892fe7e4
          echo "=== HEAD at commit ==="
          git log --oneline -1

      - name: Configure kernel (GCC)
        working-directory: kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            vendor/kona-perf_defconfig

          cp ../kernel-patches/ksu.config.pure out/.config

          make O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            olddefconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-fno-pic"

          make -j"$(nproc --all)" O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            2>&1 | tee build.log

      - name: Verify kernel image
        working-directory: kernel
        run: |
            IMAGE_GZ=out/arch/arm64/boot/Image.gz
            IMAGE=out/arch/arm64/boot/Image
            if [ ! -f "$IMAGE_GZ" ] && [ ! -f "$IMAGE" ]; then
            echo "Build failed — no kernel image produced"
            tail -200 build.log
            exit 1
            fi
            if [ ! -f "$IMAGE_GZ" ] && [ -f "$IMAGE" ]; then
            echo "Image.gz not found, compressing Image..."
            gzip -c "$IMAGE" > "$IMAGE_GZ"
            fi
            ls -lh out/arch/arm64/boot/

      - name: Prepare artifact
        run: |
            mkdir -p artifact
            cp kernel/out/arch/arm64/boot/Image.gz artifact/Image.gz
            cd artifact
            zip -r9 ../kebab-kernelsu-vanilla-gcc-a13-4.19.zip .
            cd ..
            ls -lh kebab-kernelsu-vanilla-gcc-a13-4.19.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kebab-kernelsu-vanilla-gcc-a13-4.19
          path: kebab-kernelsu-vanilla-gcc-a13-4.19.zip
          retention-days: 30
